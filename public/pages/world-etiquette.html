<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Этикет без границ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding-bottom:5rem}
.hero{padding:3rem 1.5rem 2rem;max-width:860px;margin:0 auto}
.hero-label{font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#FF6B5B;margin-bottom:0.75rem;display:block}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:700;line-height:1.2;letter-spacing:-0.02em;margin-bottom:0.75rem}
.hero p{font-size:0.95rem;color:rgba(255,255,255,0.5);font-weight:400;max-width:480px;line-height:1.6}
.section{max-width:860px;margin:0 auto;padding:0 1.5rem 1.5rem}
.section-label{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:1rem;display:block}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.6rem}
.country-card{background:#1e1e1e;border:1.5px solid #2e2e2e;border-radius:12px;padding:1rem 0.75rem;cursor:pointer;transition:all 0.2s ease;text-align:center;user-select:none}
.country-card:hover{border-color:#FF6B5B;background:#252525;transform:translateY(-2px)}
.country-card.active{border-color:#FF6B5B;background:rgba(255,107,91,0.08)}
.country-card .flag{font-size:2rem;display:block;margin-bottom:0.4rem;line-height:1}
.country-card .c-name{font-size:0.82rem;font-weight:600;color:#fff;line-height:1.2}
.country-card .c-sub{font-size:0.68rem;color:rgba(255,255,255,0.35);font-weight:400;margin-top:2px}
.divider{max-width:860px;margin:0 auto 1.5rem;padding:0 1.5rem;border:none;border-top:1px solid #2a2a2a}
.detail-panel{max-width:860px;margin:0 auto;padding:0 1.5rem;display:none}
.detail-panel.show{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.detail-inner{background:#1a1a1a;border:1.5px solid #2e2e2e;border-radius:16px;overflow:hidden}
.detail-header{padding:1.5rem;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.dh-left{display:flex;align-items:center;gap:0.9rem}
.detail-flag{font-size:2.5rem;line-height:1}
.detail-title{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:0.15rem}
.detail-tagline{font-size:0.82rem;color:rgba(255,255,255,0.4);font-weight:400}
.close-btn{width:34px;height:34px;border:1px solid #3a3a3a;border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);flex-shrink:0;transition:all 0.2s}
.close-btn:hover{border-color:#fff;color:#fff}
.close-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #2a2a2a}
.info-card{padding:1.25rem 1.5rem;border-right:1px solid #2a2a2a}
.info-card:last-child{border-right:none}
.ic-label{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.4rem}
.ic-value{font-size:0.9rem;font-weight:600;color:#fff;margin-bottom:0.25rem;line-height:1.3}
.ic-desc{font-size:0.8rem;color:rgba(255,255,255,0.45);line-height:1.45}
.tags-row{padding:1rem 1.5rem;border-bottom:1px solid #2a2a2a;display:flex;flex-wrap:wrap;align-items:center;gap:0.4rem}
.tags-group-label{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-right:0.2rem}
.tags-group-label.second{margin-left:0.5rem}
.tag{padding:0.28rem 0.75rem;border-radius:50px;font-size:0.76rem;font-weight:500;border:1px solid #3a3a3a;background:#252525;color:rgba(255,255,255,0.7)}

.tag.dont{background:rgba(255,107,91,0.1);border-color:rgba(255,107,91,0.3);color:#FF6B5B}
.compare-block{padding:1.25rem 1.5rem}
.compare-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem}
.compare-header .flag-pair{font-size:1rem;line-height:1}
.compare-header h3{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:0.02em}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.compare-item{background:#222;border:1px solid #2e2e2e;border-radius:10px;padding:0.8rem 1rem;transition:border-color 0.2s}
.compare-item:hover{border-color:#3a3a3a}
.ci-label{font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#FF6B5B;margin-bottom:0.4rem}
.ci-row{display:flex;flex-direction:column;gap:0.25rem}
.ci-entry{font-size:0.8rem;color:rgba(255,255,255,0.55);line-height:1.4;display:flex;align-items:baseline;gap:0.3rem}
.ci-entry .flag-sm{font-size:0.8rem;flex-shrink:0}
.kz-block{padding:1.25rem 1.5rem}
.kz-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:1rem}
.kz-item{background:#222;border:1px solid #2e2e2e;border-radius:10px;padding:0.8rem 1rem}
.kz-item .ki-label{font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#FF6B5B;margin-bottom:0.3rem}
.kz-item .ki-text{font-size:0.82rem;color:rgba(255,255,255,0.55);line-height:1.4}
.empty-state{max-width:860px;margin:0 auto;padding:0 1.5rem}
.empty-inner{border:1.5px dashed #2a2a2a;border-radius:16px;padding:3rem;text-align:center}
.empty-inner .eg{font-size:2.5rem;display:block;margin-bottom:0.75rem;opacity:0.3}
.empty-inner p{font-size:0.88rem;color:rgba(255,255,255,0.3);max-width:280px;margin:0 auto;line-height:1.5}
@media(max-width:600px){
  .hero{padding:2rem 1rem 1.5rem}
  .section{padding:0 1rem 1.5rem}
  .detail-panel{padding:0 1rem}
  .info-row{grid-template-columns:1fr}
  .info-card{border-right:none;border-bottom:1px solid #2a2a2a}
  .info-card:last-child{border-bottom:none}
  .compare-grid{grid-template-columns:1fr}
  .kz-grid{grid-template-columns:1fr}
  .detail-header{padding:1.1rem 1rem}
  .tags-row{padding:0.9rem 1rem}
  .compare-block,.kz-block{padding:1rem}
}
</style>
</head>
<body>

<div class="hero">
  <span class="hero-label">Интерактивный гид</span>

<div class="detail-panel" id="detail-panel">

function renderGrid(){
  document.getElementById('country-grid').innerHTML=countries.map(c=>`
    <div class="country-card${activeId===c.id?' active':''}" onclick="selectC('${c.id}')">
      <span class="flag">${c.flag}</span>
      <div class="c-name">${c.name}</div>
      <div class="c-sub">${c.sub}</div>
    </div>`).join('');
}

function selectC(id){
  if(activeId===id){
    activeId=null;
    document.getElementById('detail-panel').classList.remove('show');
    document.getElementById('empty-state').style.display='block';
    renderGrid();return;
  }
  activeId=id;renderGrid();
  const c=countries.find(x=>x.id===id);
  renderDetail(c);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('detail-panel').classList.add('show');
  setTimeout(()=>document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function renderDetail(c){
  const isKz=c.id==='kz';
  const compareHtml=isKz?`
    <div class="kz-block">
      <span class="section-label">Казахстан — точка отсчёта</span>
      <div class="kz-grid">
        ${c.kzSelf.map(i=>`<div class="kz-item"><div class="ki-label">${i.label}</div><div class="ki-text">${i.text}</div></div>`).join('')}
      </div>
    </div>`:`
    <div class="compare-block">
      <div class="compare-header">
        <span class="flag-pair">🇰🇿 vs ${c.flag}</span>
        <h3>Казахстан vs ${c.name}</h3>
      </div>
      <div class="compare-grid">
        ${c.compare.map(i=>`
          <div class="compare-item">
            <div class="ci-label">${i.label}</div>
            <div class="ci-row">
              <div class="ci-entry"><span class="flag-sm">🇰🇿</span>${i.kz}</div>
              <div class="ci-entry"><span class="flag-sm">${c.flag}</span>${i.other}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('detail-inner').innerHTML=`
    <div class="detail-header">
      <div class="dh-left">
        <span class="detail-flag">${c.flag}</span>
        <div>
          <div class="detail-title">${c.name}</div>
          <div class="detail-tagline">${c.tagline}</div>
        </div>
      </div>
      <button class="close-btn" onclick="selectC('${c.id}')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="info-row">
      ${[c.greeting,c.distance,c.communication].map(card=>`
        <div class="info-card">
          <div class="ic-label">${card.title}</div>
          <div class="ic-value">${card.value}</div>
          <div class="ic-desc">${card.desc}</div>
        </div>`).join('')}
    </div>
    <div class="tags-row">
      <span class="tags-group-label">Можно</span>
      ${c.dos.map(d=>`<span class="tag do">${d}</span>`).join('')}
      <span class="tags-group-label second">Нельзя</span>
      ${c.donts.map(d=>`<span class="tag dont">${d}</span>`).join('')}
    </div>
    ${compareHtml}`;
}

renderGrid();
</script>
</body>
</html>
